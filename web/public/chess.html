<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chess LM · Inference Arcade</title>
  <meta name="description" content="Chess LM — a Seventh Seal-inspired Stockfish game with a model council, housed in the Inference Arcade." />
  <link rel="stylesheet" href="/css/theme.css" />
  <style>
    :root { --room: #91342f; --room-glow: rgba(145, 52, 47, 0.58); }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column;
      background: #090b0b; color: #e1ddd1;
      font-family: var(--font-mono);
    }
    .room-bar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.55rem 1rem;
      background: #111414;
      border-bottom: 1px solid rgba(225, 221, 209, 0.24);
      font-family: var(--font-mono);
      font-size: var(--text-md);
    }
    .room-bar a { color: #aaa69c; text-decoration: none; }
    .room-bar a:hover { color: #e1ddd1; }
    .room-bar .back::before { content: "\25C4  "; }
    .room-title {
      display: flex; align-items: center; gap: 0.5rem;
      margin: 0 auto 0 0; padding-left: 1rem;
      color: #e1ddd1; font-weight: 600; letter-spacing: 0.02em;
    }
    .room-title::before {
      content: ""; width: 0.6rem; height: 0.6rem; border-radius: 50%;
      background: var(--room); box-shadow: 0 0 8px var(--room-glow);
    }
    .room-bar .external { color: #c46660; }
    .frame-wrap { flex: 1 1 auto; position: relative; }
    iframe {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: 0; background: #090b0b;
    }
  </style>
</head>
<body>
  <nav class="room-bar" aria-label="Chess room navigation">
    <a class="back" href="/">Inference Arcade</a>
    <span class="room-title">Chess LM</span>
    <a class="external" href="https://milwrite.github.io/chess-lm/" target="_blank" rel="noopener noreferrer">open full screen &#8599;</a>
  </nav>
  <div class="frame-wrap">
    <iframe src="https://milwrite.github.io/chess-lm/" title="Chess LM — Stockfish council game"
            allow="fullscreen"></iframe>
  </div>
</body>
</html>
