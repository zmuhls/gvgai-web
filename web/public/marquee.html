<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inference Arcade — Marble Run</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%2308110E'/%3E%3Cpath d='M8 2 L14 8 L8 14 L2 8 Z' fill='%237BEFC3'/%3E%3C/svg%3E">
  <link rel="preload" href="/fonts/silkscreen-latin-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/ibm-plex-mono-latin-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/theme.css">
  <script>
    const marqueeParams = new URLSearchParams(window.location.search);
    if (marqueeParams.has('embed')) {
      document.documentElement.classList.add('marquee-embed');
    }
    if (marqueeParams.get('view') === 'full') {
      document.documentElement.classList.add('marquee-full');
    }
  </script>
  <style>
    /* Marquee layout — spectator page, tokens come from theme.css */
    .marquee {
      position: relative;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      height: 100vh;
      gap: 12px;
      padding: 14px;
    }
    .marquee-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px;
      background: rgba(13, 28, 22, 0.88);
      border: 1px solid var(--arcade-border-soft);
      border-radius: var(--radius-lg);
    }
    .marquee-nav-title {
      min-width: 0;
      font-family: var(--font-display);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--foam);
    }
    .marquee-nav-actions {
      display: flex;
      flex: 0 0 auto;
      gap: 8px;
    }
    .marquee-nav a,
    .marquee-nav button {
      appearance: none;
      display: inline-grid;
      place-items: center;
      min-height: 32px;
      padding: 0 12px;
      background: rgba(5, 11, 9, 0.72);
      border: 1px solid rgba(123, 239, 195, 0.34);
      border-radius: var(--radius-md);
      color: var(--mint);
      font-family: var(--font-display);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
    }
    .marquee-nav a:hover,
    .marquee-nav button:hover,
    .marquee-nav a:focus-visible,
    .marquee-nav button:focus-visible {
      background: var(--mint-faint);
      color: var(--mint-bright);
      border-color: var(--mint);
    }
    header { display: flex; align-items: center; justify-content: space-between; }
    .title {
      font-family: var(--font-display);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--foam);
    }
    .title .dot { color: var(--mint); text-shadow: var(--lamp-glow); }
    .live {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-mono);
      font-size: 0.68rem; color: var(--foam-dim);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .live .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--arcade-text-dim); transition: background .2s, box-shadow .2s; }
    .live.on .pip { background: var(--mint); box-shadow: var(--lamp-glow); }
    .nowplaying {
      font-family: var(--font-mono);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--foam);
      text-shadow: 0 0 8px rgba(123, 239, 195, 0.18);
    }
    .nowplaying strong { color: var(--mint); }
    .stage { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; min-height: 0; }
    .screen {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      border: 1px solid var(--mint-dim);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    /* glass scanlines, same treatment as the arcade cabinet */
    .screen::after {
      content: "";
      position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(0deg,
        rgba(0, 0, 0, 0.2) 0px, rgba(0, 0, 0, 0.2) 1px,
        transparent 1px, transparent 3px);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
      object-fit: contain;
    }
    .overlay {
      position: absolute; top: 8px; left: 8px; z-index: 3;
      display: flex; gap: 14px;
      padding: 5px 10px;
      background: rgba(5, 11, 9, 0.92);
      border: 1px solid rgba(123, 239, 195, 0.34);
      box-shadow: 0 0 18px rgba(123, 239, 195, 0.08);
      font-family: var(--font-mono);
      font-size: 0.76rem;
      font-weight: 600;
    }
    .overlay span { color: var(--foam); text-transform: uppercase; }
    .overlay strong { color: var(--mint); margin-left: 4px; font-variant-numeric: tabular-nums; }
    .side { display: grid; grid-template-rows: auto 1fr auto; gap: 12px; min-height: 0; }
    .panel {
      min-height: 0;
      padding: 10px;
      background: var(--deck);
      border: 1px solid var(--arcade-border-soft);
      border-radius: var(--radius-lg);
    }
    .panel h3 {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: 0.56rem; font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--mint);
    }
    .narration { overflow-y: auto; }
    #narration { overflow-y: auto; max-height: 100%; }
    .entry { padding: 6px 0; border-bottom: 1px dashed var(--arcade-border-soft); font-size: 0.74rem; }
    .entry .reason { color: var(--foam-dim); font-family: var(--font-mono); line-height: 1.45; }
    .entry:first-child .reason { color: var(--foam); }
    .entry .act { color: var(--arcade-text-dim); font-family: var(--font-mono); margin-top: 3px; }
    .entry .act b { color: var(--mint); }
    .plan-tape { display: flex; flex-wrap: nowrap; align-items: center; margin-top: 4px;
      overflow-x: auto; scrollbar-width: none; }
    .plan-tape::-webkit-scrollbar { display: none; }
    .plan-cell { flex: 0 0 auto; padding: 2px 7px; margin-left: -1px;
      border: 1px solid var(--arcade-border-soft); background: var(--well);
      color: var(--arcade-text-dim); font-family: var(--font-mono);
      font-size: 10px; text-transform: uppercase; white-space: nowrap; }
    .plan-cell:first-child { margin-left: 0; }
    .plan-cell.is-live { position: relative; z-index: 1; border-color: var(--mint);
      color: var(--mint); background: var(--mint-faint); }
    .plan-cell.is-done { color: var(--arcade-text-dim); opacity: 0.55;
      background: repeating-linear-gradient(135deg, rgba(228, 251, 240, 0.07) 0 2px, transparent 2px 6px); }
    .plan-count { flex: 0 0 auto; margin-left: 7px; color: var(--arcade-text-dim);
      font-family: var(--font-mono); font-size: 10px; font-variant-numeric: tabular-nums; }
    .upnext-item { font-family: var(--font-mono); font-size: 0.72rem; color: var(--foam-dim); padding: 3px 0; }
    .upnext-item b { color: var(--foam); }
    footer { display: flex; justify-content: space-between;
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--foam-dim); }
    .ticker { font-family: var(--font-mono); }
    .ticker b { color: var(--mint); }
    .loop { color: var(--brass); font-weight: 700; letter-spacing: 0.05em; }

    /* compact iframe mode for the floating homepage mini-player */
    html.marquee-embed,
    html.marquee-embed body {
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    html.marquee-embed .marquee {
      display: grid;
      grid-template-rows: minmax(0, 1fr) 42px;
      height: 100vh;
      min-height: 0;
      padding: 0;
      gap: 0;
      background: #000;
    }
    html.marquee-embed header,
    html.marquee-embed .marquee-nav,
    html.marquee-embed .side,
    html.marquee-embed footer,
    html.marquee-embed .overlay {
      display: none;
    }
    html.marquee-embed .stage {
      display: block;
      grid-row: 1;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }
    html.marquee-embed .screen {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      border-radius: 0;
    }
    html.marquee-embed canvas {
      object-fit: cover;
    }
    html.marquee-embed .nowplaying {
      position: static;
      grid-row: 2;
      z-index: 4;
      display: flex;
      align-items: center;
      min-width: 0;
      width: 100%;
      padding: 7px 10px;
      overflow: hidden;
      border: 0;
      border-top: 1px solid rgba(123, 239, 195, 0.44);
      background: rgba(3, 8, 7, 0.94);
      box-shadow: 0 0 20px rgba(123, 239, 195, 0.12);
      color: var(--foam);
      font-size: 0.78rem;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* expanded pop-out opts into the full viewer with ?view=full */
    html.marquee-embed.marquee-full body {
      background: var(--abyss);
    }
    html.marquee-embed.marquee-full .marquee {
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 12px;
      padding: 14px;
      background: var(--abyss);
    }
    html.marquee-embed.marquee-full header,
    html.marquee-embed.marquee-full .marquee-nav,
    html.marquee-embed.marquee-full .side,
    html.marquee-embed.marquee-full footer {
      display: flex;
    }
    html.marquee-embed.marquee-full .side {
      display: grid;
    }
    html.marquee-embed.marquee-full .overlay {
      display: flex;
    }
    html.marquee-embed.marquee-full .nowplaying {
      grid-row: auto;
      padding: 0;
      border: 0;
      background: transparent;
      font-size: 0.8rem;
    }
    html.marquee-embed.marquee-full .stage {
      display: grid;
      grid-row: auto;
      grid-template-columns: minmax(0, 1.7fr) minmax(220px, 0.8fr);
      gap: 12px;
    }
    html.marquee-embed.marquee-full .screen {
      border: 1px solid var(--mint-dim);
      border-radius: var(--radius-lg);
    }
    html.marquee-embed.marquee-full canvas {
      object-fit: contain;
    }

    /* narrow / portrait viewers: stack the screen above the side panels */
    @media (max-width: 900px) {
      .marquee { height: auto; min-height: 100vh; }
      .stage { grid-template-columns: minmax(0, 1fr); }
      .screen { min-height: 280px; max-height: 48vh; }
      .side { grid-template-rows: auto minmax(180px, 1fr) auto; }
      #narration { max-height: 40vh; }
    }
  </style>
</head>
<body>
  <div class="marquee">
    <nav class="marquee-nav" aria-label="Marble run navigation">
      <div class="marquee-nav-title">Spectator feed</div>
      <div class="marquee-nav-actions">
        <button type="button" id="marquee-back">Back</button>
        <a href="/">Arcade home</a>
      </div>
    </nav>
    <header>
      <div class="title">Inference Arcade <span class="dot">◆</span> Marble Run</div>
      <div class="live" id="live"><span class="pip"></span><span id="live-text">connecting…</span></div>
    </header>
    <div class="nowplaying" id="nowplaying">Waiting for the next marble…</div>
    <div class="stage">
      <div class="screen">
        <canvas id="canvas" width="320" height="240"></canvas>
        <div class="overlay">
          <div><span>Score</span><strong id="score">0</strong></div>
          <div><span>Health</span><strong id="health">—</strong></div>
          <div><span>Tick</span><strong id="tick">0</strong></div>
        </div>
      </div>
      <div class="side">
        <div class="panel"><h3>Up Next</h3><div id="upnext">—</div></div>
        <div class="panel narration"><h3>Move Trace</h3><div id="narration"></div></div>
        <div class="panel"><h3>Last Result</h3><div id="ticker" class="ticker">—</div></div>
      </div>
    </div>
    <footer>
      <div id="playlist-pos">—</div>
      <div class="loop" id="loop">Loop 0</div>
    </footer>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/marquee.js"></script>
  <script>
    document.getElementById('marquee-back')?.addEventListener('click', () => {
      if (window.history.length > 1) window.history.back();
      else window.location.href = '/';
    });
  </script>
</body>
</html>
