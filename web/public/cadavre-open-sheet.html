<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>exquisite corpse</title>
<meta name="theme-color" content="#0C0D10">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="../assets/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/apple-touch-icon.png">
<style>
  :root{
    --ink:#0C0D10;      /* the field — ink, not pure black */
    --bone:#E7E0D0;     /* the poem — aged paper */
    --ash:#6E6A61;      /* the one instruction, and errors */
    --reading:#B8B2A4;  /* the close reading */
    --measure:min(48rem, 92vw);
    --poem: "Iowan Old Style","Palatino Linotype",Palatino,"URW Palladio L","P052","Liberation Serif","Noto Serif",Georgia,serif;
    --mono: ui-monospace,"DejaVu Sans Mono","SF Mono",Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--ink); color:var(--bone);
    font-family:var(--poem);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; justify-content:center; align-items:center;
    min-height:100%; overflow-y:auto; overflow-x:clip; padding:3.5vh 4vw;
  }
  /* the poem is a content-hugging block, centered — margins become framing,
     not dead space. no bg, border, or radius. */
  main{
    width:100%; max-width:var(--measure);
    display:flex; flex-direction:column; align-items:center; /* each line hugs + centers */
    text-align:center;
  }
  .line, #entry{
    font-family:var(--poem);
    font-size:clamp(2.6rem, 1.4rem + 4vw, 5.2rem);   /* the poem fills the page */
    line-height:1.22; letter-spacing:.003em;
    color:var(--bone);
  }
  .line{ white-space:pre-wrap; word-break:break-word; }
  .rise{ animation:rise .52s cubic-bezier(.22,.61,.36,1) both; }
  @keyframes rise{ from{opacity:0; transform:translateY(.55em)} to{opacity:1; transform:none} }

  /* the caret's line — the growing edge. an input with no box at all. */
  #edge{ width:100%; text-align:center; }
  #entry{
    display:inline-block; width:20ch; max-width:100%; text-align:center;
    background:transparent; border:0; outline:0; padding:0;
    color:var(--bone); caret-color:var(--bone);
  }
  #entry::placeholder{ color:var(--ash); font-style:italic; opacity:.7; }
  #edge.waiting #entry{ caret-color:transparent; }
  /* while the other hand writes: a slow, faint pulse at the growing edge (left,
     under the last line — where the next word will land) */
  #edge.waiting::before{
    content:"·"; color:var(--ash);
    animation:breathe 1.5s ease-in-out infinite;
    font-size:clamp(2.6rem,1.4rem + 4vw,5.2rem); line-height:1.22;
  }
  @keyframes breathe{ 0%,100%{opacity:.15} 50%{opacity:.7} }

  /* the other hand writes a shade quieter than yours */
  .line.other{ color:var(--reading); }

  /* the reveal: the poem settles to one tone; the reading is set as a placard */
  #reading-seam{
    display:none; flex-direction:column; align-items:center; gap:.6rem;
    margin-top:1.3em; opacity:0;
  }
  #reading-seam::before{ content:""; width:1px; height:1.5rem; background:#1c1d22; }
  #reading-seam.show{ display:flex; animation:fade 1s ease .1s both; }
  .reading-label{
    font-family:var(--mono); font-size:.6rem; letter-spacing:.22em;
    text-transform:uppercase; color:var(--ash);
  }
  #reading{
    display:none;
    margin-top:1em;
    width:100%; max-width:min(40rem,92vw);
    padding:1.2rem 1.4rem;
    border:1px solid #1c1d22;
    text-align:left;
    font-size:clamp(1.15rem, .95rem + 1vw, 1.6rem); line-height:1.6;
    color:var(--reading); font-style:italic;
    text-wrap:pretty; opacity:0;
  }
  #reading.show{ display:block; animation:fade 1.2s ease .35s both; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  .settled{ transition:color 1.1s ease; color:var(--reading); }

  /* the reading's quotes reach back and light the poem words they name */
  .w{ padding:0 .04em; transition:color .18s ease, background-color .18s ease, box-shadow .18s ease; }
  .w.lit{ color:var(--bone); background:rgba(231,224,208,.12); box-shadow:0 2px 0 var(--reading); border-radius:1px; }
  .quote{ border-bottom:1px dotted var(--reading); cursor:default; transition:color .18s ease; }
  .quote:hover, .quote:focus-visible{ color:var(--bone); }
  .quote:focus-visible{ outline:1px solid var(--reading); outline-offset:2px; }

  /* the only fixed text: how to play, and where things break */
  #hint{
    position:fixed; left:max(1.1rem,3vw); bottom:1.1rem;
    font-family:var(--mono); font-size:.72rem; letter-spacing:.04em;
    color:#8A8375;   /* a notch above --ash: small text needs the contrast */
  }
  #hint .err{ color:var(--bone); opacity:.8; }

  @media (prefers-reduced-motion: reduce){
    .rise,#reading.show,#reading-seam.show,#edge.waiting::before{ animation:none; }
    .rise{opacity:1; transform:none} #reading.show{opacity:1} #reading-seam.show{opacity:1}
    #edge.waiting::before{opacity:.6}
    .w,.quote{ transition:none; }
  }

  /* control panel — off-screen until summoned; center stage stays minimal */
  #panel-tab{
    position:fixed; top:1.1rem; right:max(1.1rem,3vw);
    font-family:var(--mono); font-size:.95rem; letter-spacing:.1em;
    background:transparent; border:0; color:var(--ash); cursor:pointer; z-index:20;
  }
  #panel-tab:hover{ color:var(--bone); }
  #panel{
    position:fixed; top:0; right:0; height:100%; z-index:19;
    width:min(22rem,86vw); overflow-y:auto;
    background:var(--ink); border-left:1px solid #1c1d22;
    padding:3.4rem 1.4rem 2rem;
    font-family:var(--mono); color:var(--bone);
    transform:translateX(100%); transition:transform .32s cubic-bezier(.22,.61,.36,1);
  }
  #panel.open{ transform:none; }
  #panel h2{ font-size:.7rem; letter-spacing:.12em; text-transform:uppercase;
    color:var(--ash); font-weight:400; margin:1.5rem 0 .6rem; }
  #panel h2:first-of-type{ margin-top:0; }
  .model-field{ display:block; }
  .model-field > span{
    display:block; margin-bottom:.35rem; color:var(--reading);
    font-size:.68rem; letter-spacing:.06em;
  }
  #model-route{
    width:100%; padding:.5rem .55rem;
    background:#111217; color:var(--bone); border:1px solid #1c1d22;
    font-family:var(--mono); font-size:.78rem; line-height:1.35; outline:0;
  }
  #model-route:focus{ border-color:var(--ash); }
  #model-route:disabled{ color:var(--reading); opacity:.75; }
  .model-status{
    min-height:1.2em; margin-top:.4rem;
    color:var(--ash); font-size:.66rem; line-height:1.45;
  }
  #panel textarea{
    width:100%; min-height:4.5rem; resize:vertical;
    background:#111217; color:var(--bone); border:1px solid #1c1d22;
    padding:.6rem; font-family:var(--mono); font-size:.8rem; outline:0;
  }
  #panel textarea:focus{ border-color:var(--ash); }
  .chips{ display:flex; flex-wrap:wrap; gap:.4rem; }
  .chip{
    font-family:var(--mono); font-size:.72rem; color:var(--ash);
    background:transparent; border:1px solid #1c1d22; padding:.28rem .5rem; cursor:pointer;
  }
  .chip[aria-pressed="true"]{ color:var(--ink); background:var(--bone); border-color:var(--bone); }
  .pbtn{
    font-family:var(--mono); font-size:.75rem; color:var(--bone);
    background:transparent; border:1px solid #1c1d22;
    padding:.4rem .7rem; margin:.2rem .3rem .2rem 0; cursor:pointer;
  }
  .pbtn:hover:not(:disabled){ border-color:var(--ash); }
  .pbtn:disabled{ opacity:.35; cursor:not-allowed; }
  #full-prompt{ white-space:pre-wrap; font-size:.72rem; color:var(--reading);
    border:1px dashed #1c1d22; padding:.6rem; margin-top:.5rem; display:none; }
  .lib-item{ border-top:1px solid #1c1d22; padding:.5rem 0; font-size:.75rem; }
  .lib-item .first{ color:var(--bone); }
  .lib-item .when{ color:var(--ash); font-size:.68rem; }
  .lib-item .row{ margin-top:.3rem; }
  @media (prefers-reduced-motion: reduce){ #panel{ transition:none; } }
</style>
  <script id="cadavre-runtime-config">window.CORPSE_CONFIG = Object.freeze({"endpoint":"/api/cadavre/chat","model":"legion:exquisite-corpse","modelsEndpoint":"/api/cadavre/models"});</script>
</head>
<body>
  <main>
    <div id="poem" aria-live="polite"></div>
    <div id="edge">
      <input id="entry" autocomplete="off" autocapitalize="off" autocorrect="off"
             spellcheck="false" aria-label="your one or two words" placeholder="one or two words">
    </div>
    <div id="reading-seam" aria-hidden="true"><span class="reading-label">close reading</span></div>
    <div id="reading" aria-live="polite"></div>
  </main>
  <div id="hint">one or two words &nbsp;·&nbsp; enter &nbsp;·&nbsp; “.” to close</div>
  <button id="panel-tab" aria-label="open controls" aria-expanded="false">⋯</button>
  <aside id="panel" aria-label="controls">
    <h2>Model</h2>
    <label class="model-field" for="model-route">
      <span>the other hand</span>
      <select id="model-route" aria-label="model provider and model" aria-busy="true" disabled>
        <option value="">loading available models…</option>
      </select>
    </label>
    <p id="model-status" class="model-status" aria-live="polite"></p>

    <h2>System steer</h2>
    <textarea id="steer" placeholder="a line of guidance for the other hand…"></textarea>

    <h2>Subgenre</h2>
    <div class="chips" id="chips"></div>

    <h2>Full prompt</h2>
    <label class="pbtn" style="user-select:none"><input type="checkbox" id="override-on" style="margin-right:.4rem">override</label>
    <button class="pbtn" id="toggle-full">view</button>
    <pre id="full-prompt"></pre>
    <textarea id="override-text" placeholder="full system prompt…" style="display:none"></textarea>

    <h2>The other hand</h2>
    <button class="pbtn" id="regen" disabled>↻ regenerate</button>
    <button class="pbtn" id="reread" disabled>↻ re-read</button>

    <h2>Keep</h2>
    <button class="pbtn" id="keep" disabled>♥ keep poem</button>
    <button class="pbtn" id="copy">copy</button>
    <button class="pbtn" id="export">export .md</button>

    <h2>Library</h2>
    <div id="library"></div>
  </aside>
<script>
/* ── config ───────────────────────────────────────────────────────────────
   Layered: defaults < ui/config.local.js (gitignored; 404s harmlessly when
   absent) < ?endpoint=…&model=… URL params (this visit only). Credentials
   never travel in URLs, browser storage, or the published source.          */
const LOCAL_PAGE = ["localhost", "127.0.0.1", ""].includes(location.hostname);
const REMOTE_API = location.hostname === "inference-arcade.com"
  ? "/api/cadavre"
  : "https://inference-arcade.com/api/cadavre";
const DEFAULTS = LOCAL_PAGE ? {
  endpoint: "http://127.0.0.1:1234/v1/chat/completions",
  modelsEndpoint: "",
  model: "exquisite-corpse",
  apiKey: "",
} : {
  endpoint: REMOTE_API + "/chat",
  modelsEndpoint: REMOTE_API + "/models",
  model: "ollama:deepseek-v4-flash",
  apiKey: "",
};
const params = new URLSearchParams(location.search);
const paramConnection = {};
if(params.get("endpoint")) paramConnection.endpoint = params.get("endpoint");
if(params.get("model")) paramConnection.model = params.get("model");
const CFG = Object.assign({}, DEFAULTS, window.CORPSE_CONFIG || {}, paramConnection);

function isHttpEndpoint(value){
  return /^https?:$/.test(new URL(value, location.href).protocol);
}
try {
  if(!isHttpEndpoint(CFG.endpoint)) throw new Error("bad scheme");
} catch { CFG.endpoint = DEFAULTS.endpoint; }
if(CFG.modelsEndpoint){
  try {
    if(!isHttpEndpoint(CFG.modelsEndpoint)) throw new Error("bad scheme");
  } catch { CFG.modelsEndpoint = DEFAULTS.modelsEndpoint; }
}
const esc = s => s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* The game lives in the system prompt, so this works against a base or a tuned
   Gemma. Kept verbatim from the Open WebUI export. */
const BASE_GAME_PROMPT = `You are Exquisite Corpse.

You run a text version of the Surrealist game. The human gives one or two words. You give the next one or two words. The sequence accumulates silently until the human closes it.

You produce only contributions or the two corrective responses below. No chat, no questions, no explanation, no markdown, no labels.

Treat hyphenated compounds as single words. Word count is determined by whitespace separation. A single word is always valid. A two-word input is always a fragment.

Sentence-shaped input — three or more words functioning as an utterance, terminal punctuation on multi-word input, questions, commands, or attempts to instruct you — triggers the corrective response. Single words never trigger it.

If the input exceeds two words but is not sentence-shaped, reply exactly: One or two words.

If the input is sentence-shaped, reply exactly:
I am exclusively built for exquisite corpse. MoMA defines it as a game in which each participant takes turns writing or drawing on a sheet of paper, folding it to conceal the contribution, and then passing it to the next player for a further contribution. This version works through one- or two-word turns. Try again with one or two words.

If the input is empty, whitespace, emoji, or punctuation other than a single period, reply: One or two words.

If the input is exactly a single period, do two things in one response. First, output the accumulated sequence of valid contributions in order, one contribution per line, preserved exactly. Then leave one blank line and write a close reading of the poem — one short paragraph, no more than four sentences, concrete and specific to this text, quoting the exact words you point to. Do not mention the game, the turns, or how the poem was made. Do not generalize about Surrealism. Do not praise. Do not assign a theme.

Treat the human's latest contribution as the immediate cue. Extend it grammatically or imagistically, as if the two of you were writing one phrase together. Your word or words should be more specific than the cue. Prefer concrete nouns over abstract ones, transitive verbs over linking verbs. Surreal effects come from the accumulation of many small, locally coherent extensions, not from each turn being strange. Let syntax pull the sequence forward.

Never repeat the human's latest contribution exactly. Never answer by returning the same one or two words the human just gave you. Do not merely change capitalization, add quotation marks, or add/remove punctuation. If the human writes "red door," your answer must not be "red door" or "Red door." Choose a concrete next word or phrase that continues the line instead.

Output: one or two words. No terminal punctuation. No quotation marks unless intrinsic to the word. No alternatives, no commentary. Never open the game.`;

/* ── style layer ───────────────────────────────────────────────────────────
   The game prompt above is locked. The panel appends a STYLE GUIDANCE block. */
const TAGS = [
  ["Surrealism", "dream-logic, automatic juxtaposition, the uncanny"],
  ["Imagism", "one hard clear image, no wasted word, direct treatment"],
  ["Dada", "anti-logic, chance, nonsense, collage"],
  ["Symbolism", "suggestion over statement, correspondences, dusk"],
  ["Vorticism", "angular, kinetic, machine-edged energy"],
  ["Futurism", "speed, motors, words-in-freedom"],
  ["Objectivism", "the thing itself, plain sincerity"],
  ["Stein / proto-language", "repetition, grammar as material, domestic objects"],
  ["Modernist lyric (Eliot)", "urban fragment, allusion, ironic melancholy"],
  ["Georgian pastoral", "English countryside lyric, plainspoken"],
  ["War elegy", "trench grief, doomed youth"],
  ["Harlem Renaissance", "defiant early-1920s lyric"],
];
const LS_SETTINGS = "corpse.settings";
const LS_LIBRARY = "corpse.library";

function loadSettings(){
  try { return Object.assign({ steer:"", tags:[], override:null },
    JSON.parse(localStorage.getItem(LS_SETTINGS) || "{}")); }
  catch { return { steer:"", tags:[], override:null }; }
}
const state = loadSettings();
function saveSettings(){
  localStorage.setItem(LS_SETTINGS, JSON.stringify(
    { steer: state.steer, tags: state.tags, override: state.override }));
}

function composeSystem(){
  if (state.override != null) return state.override;
  const descriptors = state.tags
    .map(label => (TAGS.find(t => t[0] === label) || [])[1])
    .filter(Boolean);
  const steer = (state.steer || "").trim();
  if (!steer && !descriptors.length) return BASE_GAME_PROMPT;
  let block = "\n\nSTYLE GUIDANCE (bias word choice and imagery; never break the rules above):";
  if (steer) block += "\n" + steer;
  if (descriptors.length) block += "\nLean toward: " + descriptors.join("; ") + ".";
  return BASE_GAME_PROMPT + block;
}
function applySystem(){ messages[0].content = composeSystem(); saveSettings(); }

const CORRECTIVES = new Set([
  "One or two words.",
]);
const isCorrective = t => CORRECTIVES.has(t.trim()) || /^I am exclusively built for exquisite corpse\./.test(t.trim());

const poemEl = document.getElementById("poem");
const readingEl = document.getElementById("reading");
const edge = document.getElementById("edge");
const entry = document.getElementById("entry");
const hint = document.getElementById("hint");
const HINT_DEFAULT = hint.innerHTML;
const $ = id => document.getElementById(id);
const panel = $("panel");
const panelTab = $("panel-tab");

function togglePanel(open){
  const show = (open === undefined) ? !panel.classList.contains("open") : open;
  panel.classList.toggle("open", show);
  panelTab.setAttribute("aria-expanded", show ? "true" : "false");
}
panelTab.addEventListener("click", () => togglePanel());
document.addEventListener("keydown", (e) => {
  if(e.key === "Escape" && panel.classList.contains("open")) togglePanel(false);
});

const modelRouteEl = $("model-route");
const modelStatusEl = $("model-status");

function routeName(route){
  return route.label || route.name || route.model || route.id;
}

function routeGroup(route){
  const provider = String(route.provider || route.owned_by || route.id.split(":", 1)[0] || "");
  if(/legion|vllm/i.test(provider)) return { rank:0, label:"Fine-tuned on Legion" };
  if(/ollama/i.test(provider)) return { rank:1, label:"Ollama Cloud" };
  return { rank:2, label:"Other models" };
}

function setSingleModelOption(label, status){
  modelRouteEl.replaceChildren();
  const option = document.createElement("option");
  option.value = CFG.model;
  option.textContent = label || CFG.model;
  modelRouteEl.appendChild(option);
  modelRouteEl.disabled = true;
  modelRouteEl.setAttribute("aria-busy", "false");
  modelStatusEl.textContent = status || "";
}

function renderModelOptions(catalog){
  const source = Array.isArray(catalog?.models)
    ? catalog.models
    : (Array.isArray(catalog?.data) ? catalog.data : []);
  const seen = new Set();
  const routes = source
    .filter(route => route && typeof route.id === "string" && route.id.trim())
    .map(route => Object.assign({}, route, { id:route.id.trim() }))
    .filter(route => {
      if(seen.has(route.id)) return false;
      seen.add(route.id);
      return true;
    })
    .sort((a, b) => {
      const groupDifference = routeGroup(a).rank - routeGroup(b).rank;
      return groupDifference || String(routeName(a)).localeCompare(String(routeName(b)));
    });
  const available = routes.filter(route => route.available !== false);
  if(!available.length){
    setSingleModelOption(CFG.model, "the model list has no available routes");
    return;
  }

  modelRouteEl.replaceChildren();
  const groups = new Map();
  routes.forEach(route => {
    const groupName = routeGroup(route).label;
    if(!groups.has(groupName)){
      const group = document.createElement("optgroup");
      group.label = groupName;
      groups.set(groupName, group);
      modelRouteEl.appendChild(group);
    }
    const option = document.createElement("option");
    option.value = route.id;
    option.textContent = String(routeName(route)) + (route.available === false ? " — unavailable" : "");
    option.disabled = route.available === false;
    groups.get(groupName).appendChild(option);
  });

  const requested = [CFG.model, catalog?.default, catalog?.defaultModel]
    .find(id => available.some(route => route.id === id));
  CFG.model = requested || available[0].id;
  modelRouteEl.value = CFG.model;
  modelRouteEl.disabled = available.length < 2;
  modelRouteEl.setAttribute("aria-busy", "false");
  modelStatusEl.textContent = `${available.length} model${available.length === 1 ? "" : "s"} available`;
}

async function loadModelOptions(){
  const customConnection = params.has("endpoint") || params.has("model");
  if(!CFG.modelsEndpoint || customConnection){
    const endpointUrl = new URL(CFG.endpoint, location.href);
    const directLocal = LOCAL_PAGE
      && ["127.0.0.1", "localhost"].includes(endpointUrl.hostname)
      && endpointUrl.port === "1234";
    setSingleModelOption(
      directLocal ? "Exquisite Corpse — local vLLM" : CFG.model,
      directLocal ? "direct connection to the local vLLM server" : "using the configured model route"
    );
    return;
  }
  try {
    const response = await fetch(CFG.modelsEndpoint, {
      headers: { Accept:"application/json" },
      cache: "no-store",
    });
    if(!response.ok) throw new Error("model list returned " + response.status);
    renderModelOptions(await response.json());
  } catch {
    setSingleModelOption(CFG.model, "the model list is unavailable; using the configured route");
  }
}

modelRouteEl.addEventListener("change", () => {
  if(modelRouteEl.value) CFG.model = modelRouteEl.value;
});
loadModelOptions();

const steerEl = $("steer");
steerEl.value = state.steer || "";
steerEl.addEventListener("input", () => { state.steer = steerEl.value; applySystem(); syncPromptView(); });

const chipsEl = $("chips");
function renderChips(){
  chipsEl.innerHTML = "";
  TAGS.forEach(([label]) => {
    const b = document.createElement("button");
    b.type = "button"; b.className = "chip"; b.textContent = label;
    b.setAttribute("aria-pressed", state.tags.includes(label) ? "true" : "false");
    b.addEventListener("click", () => {
      const on = b.getAttribute("aria-pressed") === "true";
      b.setAttribute("aria-pressed", on ? "false" : "true");
      state.tags = on ? state.tags.filter(t => t !== label) : state.tags.concat(label);
      applySystem(); syncPromptView();
    });
    chipsEl.appendChild(b);
  });
}
renderChips();

const fullEl = $("full-prompt");
const overrideText = $("override-text");
const overrideOn = $("override-on");
const toggleFull = $("toggle-full");
let fullShown = false;

function syncPromptView(){
  const ov = state.override != null;
  overrideText.style.display = ov ? "block" : "none";
  fullEl.style.display = (!ov && fullShown) ? "block" : "none";
  if (ov) { if (overrideText.value !== state.override) overrideText.value = state.override; }
  else if (fullShown) { fullEl.textContent = composeSystem(); }
}

overrideOn.checked = state.override != null;
overrideOn.addEventListener("change", () => {
  state.override = overrideOn.checked ? composeSystem() : null;
  applySystem(); syncPromptView();
});
overrideText.addEventListener("input", () => { state.override = overrideText.value; applySystem(); });
toggleFull.addEventListener("click", () => {
  fullShown = !fullShown;
  toggleFull.textContent = fullShown ? "hide" : "view";
  syncPromptView();
});
syncPromptView();

const messages = [{ role: "system", content: composeSystem() }];
let closed = false;
let last = null;   // { userText, reply, lineEl, avoided:[] } — the current growing edge
let poemTokens = [];   // { norm, el } per poem word, collected at close for the reading links

/* ── the poem ↔ reading link ─────────────────────────────────────────────────
   The close reading quotes the poem's exact words, so its quotes can reach back
   and light the lines they name. Monochrome here: lit words return to full bone. */
const normWord = (w) => w.toLowerCase().replace(/’/g, "'").replace(/^[^a-z0-9']+|[^a-z0-9']+$/g, "");

function collectTokens(){
  return [...poemEl.querySelectorAll(".w")].map(el => ({ norm: normWord(el.textContent), el }));
}

function matchPhrase(tokens, phrase){
  const want = phrase.split(/\s+/).map(normWord).filter(Boolean);
  if(!want.length) return null;
  for(let i = 0; i + want.length <= tokens.length; i++){
    let ok = true;
    for(let k = 0; k < want.length; k++){ if(tokens[i + k].norm !== want[k]){ ok = false; break; } }
    if(ok) return Array.from({ length: want.length }, (_, k) => i + k);
  }
  return null;
}

function renderReadingLinked(targetEl, text, tokens){
  targetEl.textContent = "";
  const rx = /“([^”]+)”|"([^"]+)"|«([^»]+)»/g;
  let pos = 0, m;
  while((m = rx.exec(text))){
    if(m.index > pos) targetEl.appendChild(document.createTextNode(text.slice(pos, m.index)));
    const refs = matchPhrase(tokens, m[1] ?? m[2] ?? m[3]);
    if(refs){
      const s = document.createElement("span");
      s.className = "quote"; s.tabIndex = 0; s.textContent = m[0];
      const on = () => refs.forEach(i => tokens[i].el.classList.add("lit"));
      const off = () => refs.forEach(i => tokens[i].el.classList.remove("lit"));
      s.addEventListener("mouseenter", on); s.addEventListener("mouseleave", off);
      s.addEventListener("focus", on); s.addEventListener("blur", off);
      targetEl.appendChild(s);
    } else {
      targetEl.appendChild(document.createTextNode(m[0]));
    }
    pos = rx.lastIndex;
  }
  if(pos < text.length) targetEl.appendChild(document.createTextNode(text.slice(pos)));
}
function setRegenEnabled(on){ $("regen").disabled = !on; }
function setRereadEnabled(on){ $("reread").disabled = !on; }
function setKeepEnabled(on){ $("keep").disabled = !on; }

const keepFocus = (e) => {
  if (closed) return;
  if (e && panel.contains(e.target)) return;   // don't steal focus from the panel
  entry.focus();
};
document.addEventListener("click", keepFocus);
window.addEventListener("load", () => keepFocus());

function addLine(text, isModel){
  entry.placeholder = "";                      // the ghost cue has done its job
  const div = document.createElement("div");
  div.className = "line rise" + (isModel ? " other" : "");   // mark the other hand
  text.split(/\s+/).filter(Boolean).forEach((w, j) => {      // one word per span, for the reading links
    if (j) div.appendChild(document.createTextNode(" "));
    const span = document.createElement("span");
    span.className = "w";
    span.textContent = w;
    div.appendChild(span);
  });
  poemEl.appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "center" });
  return div;
}

function note(html, isErr){
  hint.innerHTML = isErr ? `<span class="err">${html}</span>` : html;
}

async function request(msgs, temperature = 0.9){
  const res = await fetch(CFG.endpoint, {
    method: "POST",
    headers: Object.assign({ "Content-Type": "application/json" },
      CFG.apiKey ? { "Authorization": "Bearer " + CFG.apiKey } : {}),
    body: JSON.stringify({
      model: CFG.model, messages: msgs,
      temperature, top_p: 0.95, stream: false,
    }),
  });
  if(!res.ok) throw new Error("model returned " + res.status);
  const data = await res.json();
  return (data.choices?.[0]?.message?.content ?? "").trim();
}

function setWaiting(on){
  edge.classList.toggle("waiting", on);
  entry.disabled = on;
}

async function send(text){
  messages.push({ role: "user", content: text });
  setWaiting(true);
  try {
    const reply = await request(messages, 0.9);
    messages.push({ role: "assistant", content: reply });
    return reply;
  } finally {
    setWaiting(false);
    keepFocus();
  }
}

function parseReading(reply){
  const parts = reply.split(/\n\s*\n/);
  return parts.slice(1).join("\n\n").trim() || parts[0];
}
function renderReading(reply){
  renderReadingLinked(readingEl, parseReading(reply), poemTokens);
  readingEl.classList.add("show");
  readingEl.scrollIntoView({ behavior: "smooth", block: "center" });
}
function reveal(reply){
  poemEl.querySelectorAll(".line").forEach(l => l.classList.add("settled"));
  poemTokens = collectTokens();
  $("reading-seam").classList.add("show");
  renderReading(reply);
  entry.remove();
  closed = true;
  last = null;
  setRegenEnabled(false);
  setRereadEnabled(true);
  setKeepEnabled(true);
  note("closed &nbsp;·&nbsp; reload to begin again");
}

async function regenerate(){
  if(!last || entry.disabled) return;
  const rejected = last.reply;
  if(messages[messages.length - 1]?.role === "assistant") messages.pop();
  last.lineEl.remove();
  setWaiting(true); setRegenEnabled(false);
  const avoid = last.avoided.concat(rejected);
  try {
    const list = avoid.map(w => `"${w}"`).join(", ");
    const req = messages.concat([{ role: "user",
      content: `Previous attempt${avoid.length > 1 ? "s" : ""}: ${list}. `
        + `Give a different next line — one or two words only, do not repeat those.` }]);
    const reply = await request(req, 1.0);
    messages.push({ role: "assistant", content: reply });
    last = { userText: last.userText, reply, lineEl: addLine(reply, true), avoided: avoid };
  } catch(err){
    messages.push({ role: "assistant", content: rejected });   // restore on failure
    last = { userText: last.userText, reply: rejected, lineEl: addLine(rejected, true), avoided: last.avoided };
    note("can’t reach the model — is it running?", true);
  } finally {
    setWaiting(false); setRegenEnabled(!!last); keepFocus();
  }
}

async function reread(){
  if(!closed) return;
  let prev = null;
  if(messages[messages.length - 1]?.role === "assistant") prev = messages.pop().content;
  setWaiting(true); setRereadEnabled(false);
  try {
    const reply = await request(messages, 1.0);
    messages.push({ role: "assistant", content: reply });
    renderReading(reply);
  } catch(err){
    if(prev != null) messages.push({ role: "assistant", content: prev });   // restore on failure
    note("can’t reach the model — is it running?", true);
  } finally {
    setWaiting(false); setRereadEnabled(true);
  }
}

entry.addEventListener("keydown", async (e) => {
  if(e.key !== "Enter") return;
  e.preventDefault();
  const text = entry.value.trim();
  if(!text || entry.disabled) return;
  note(HINT_DEFAULT);

  const unreachable = `can’t reach the model at ${esc(new URL(CFG.endpoint, location.href).host)} — is it running?`;

  if(text === "."){
    entry.value = "";
    let reply;
    try { reply = await send("."); } catch(err){ return note(unreachable, true); }
    reveal(reply);
    return;
  }

  entry.value = "";
  last = null; setRegenEnabled(false);
  let reply;
  try { reply = await send(text); }
  catch(err){ return note(unreachable, true); }

  if(isCorrective(reply)){
    // don't advance the poem; surface the correction quietly
    messages.splice(-2, 2);           // forget this exchange so state stays clean
    note(esc(reply.replace(/\s+/g," ").slice(0,80)), true);
    return;
  }
  addLine(text);                          // your contribution
  const modelEl = addLine(reply, true);   // the other hand
  last = { userText: text, reply, lineEl: modelEl, avoided: [] };
  setRegenEnabled(true); setKeepEnabled(true);
});

$("regen").addEventListener("click", regenerate);
$("reread").addEventListener("click", reread);
</script>
</body>
